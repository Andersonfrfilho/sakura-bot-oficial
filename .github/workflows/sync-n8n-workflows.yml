name: Sync n8n Workflows

on:
  push:
    branches: [main]
    paths:
      - 'n8n/workflows/**'
      - 'src/**'
      - 'database/migrations/**'
      - 'package.json'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies (TypeScript)
        run: npm ci

      - name: Type-check TypeScript sources
        run: npx tsc --noEmit

      - name: Build workflow from src/ TypeScript modules
        run: npm run build

      - name: Run flow tests
        run: npm test

      - name: Validate workflows (JSON + JS syntax + anti-patterns)
        run: bash scripts/validate-workflows.sh

  migrate:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - name: Install psql
        run: sudo apt-get install -y postgresql-client

      - name: Run database migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: bash scripts/run-migrations.sh

  sync:
    runs-on: ubuntu-latest
    needs: migrate
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build workflow before sync
        run: npm run build

      - name: Sync workflows to n8n
        env:
          N8N_URL: ${{ secrets.N8N_URL }}
          N8N_API_KEY: ${{ secrets.N8N_API_KEY }}
        run: bash scripts/import-workflows.sh
